<!DOCTYPE html>
<html>

<head>

    <title>AI Threat Detection System</title>

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            font-family: Arial, sans-serif;
            color: white;
            text-align: center;
            margin: 0;

            background: linear-gradient(135deg,
                    #020617,
                    #0f172a,
                    #1e293b,
                    #334155);

            background-size: 300% 300%;
            animation: gradientMove 12s ease infinite;

            min-height: 100vh;
        }

        @keyframes gradientMove {
            0% {
                background-position: 0% 50%;
            }

            50% {
                background-position: 100% 50%;
            }

            100% {
                background-position: 0% 50%;
            }
        }

        .header {
            background: linear-gradient(90deg,
                    #020617,
                    #0f172a,
                    #1e293b,
                    #0f172a,
                    #020617);

            padding: 24px;

            font-size: 32px;
            font-weight: 700;

            color: #f8fafc;

            border-bottom: 3px solid #38bdf8;

            box-shadow:
                0 0 15px rgba(56, 189, 248, 0.25),
                0 0 30px rgba(56, 189, 248, 0.15);

            text-transform: uppercase;
            letter-spacing: 2px;
        }

        .container {
            margin-top: 20px;
            padding-bottom: 40px;
        }

        #camera {
            width: 100%;
            height: 550px;
            object-fit: cover;
            border-radius: 12px;
            border: 2px solid #334155;
            display: none;
        }

        .dashboard {
            display: flex;
            justify-content: center;
            align-items: flex-start;
            gap: 20px;
            max-width: 1400px;
            margin: 20px auto;
            padding: 0 20px;
        }

        .video-section {
            flex: 3;
        }

        .info-section {
            flex: 1;
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .cards {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .card {
            width: 100%;
            min-height: 100px;
            background: #1e293b;
            padding: 18px;
            border-radius: 10px;
            border: 1px solid #334155;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .card-title {
            color: #38bdf8;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 8px;
        }

        .card-value {
            font-size: 22px;
            font-weight: bold;
        }

        #threat_level_card {
            width: 100%;
        }

        .threat-NONE {
            color: #22c55e;
        }

        .threat-LOW {
            color: #facc15;
        }

        .threat-MEDIUM {
            color: #f97316;
        }

        .threat-HIGH {
            color: #ef4444;
        }

        .threat-badge {
            display: inline-block;
            padding: 6px 18px;
            border-radius: 20px;
            font-size: 20px;
            font-weight: bold;
        }

        .badge-NONE {
            background: #14532d;
            color: #22c55e;
        }

        .badge-LOW {
            background: #713f12;
            color: #facc15;
        }

        .badge-MEDIUM {
            background: #7c2d12;
            color: #f97316;
        }

        .badge-HIGH {
            background: #7f1d1d;
            color: #ef4444;
        }

        .btn-row {
            margin: 16px 0;
        }

        button {
            padding: 10px 22px;
            margin: 6px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 15px;
            font-weight: bold;
        }

        .btn-green {
            background: #22c55e;
            color: #0f172a;
        }

        .btn-blue {
            background: #3b82f6;
            color: white;
        }

        .btn-red {
            background: #ef4444;
            color: white;
        }

        .status-dot {
            display: inline-block;
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: #22c55e;
            margin-right: 6px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% {
                opacity: 1;
            }

            50% {
                opacity: 0.3;
            }

            100% {
                opacity: 1;
            }
        }

        .preprocess-badge {
            font-size: 12px;
            color: #94a3b8;
            margin-top: 6px;
        }

        #alert-banner {
            display: none;
            background: #7f1d1d;
            color: #fca5a5;
            font-size: 18px;
            font-weight: bold;
            padding: 12px;
            margin: 10px auto;
            max-width: 600px;
            border-radius: 8px;
            border: 1px solid #ef4444;
            animation: blink 0.8s step-start infinite;
        }

        @keyframes blink {

            0%,
            100% {
                opacity: 1;
            }

            50% {
                opacity: 0.4;
            }
        }
    </style>

</head>

<body>

    <div class="header">
        AI Weapon Detection &amp; Face Recognition System
    </div>

    <div class="container">

        <div id="alert-banner">
            ⚠ HIGH THREAT DETECTED
        </div>

        <div class="btn-row">
            <button class="btn-green" onclick="startCamera()">
                <span class="status-dot" id="status-dot" style="display:none"></span>
                Start Camera
            </button>
            <button class="btn-red" onclick="stopCamera()">Stop Camera</button>
        </div>

        <div class="dashboard">

            <div class="video-section">
                <img id="camera">
            </div>

            <div class="info-section">

                <div class="card" id="threat_level_card">
                    <div class="card-title">Threat Level</div>
                    <div class="card-value">
                        <span class="threat-badge badge-NONE" id="threat_level">NONE</span>
                    </div>
                </div>

                <div class="card">
                    <div class="card-title">Weapon Detected</div>
                    <div class="card-value" id="weapon">None</div>
                </div>

                <div class="card">
                    <div class="card-title">Person ID</div>
                    <div class="card-value" id="person">Unknown</div>
                </div>

                <div class="card">
                    <div class="card-title">Confidence</div>
                    <div class="card-value" id="confidence">0</div>
                </div>

                <div class="card">
                    <div class="card-title">Preprocessing</div>
                    <div class="card-value" id="preprocessing">normal</div>
                </div>

            </div>

        </div>

    </div>

    <script>

        function startCamera() {
            const cam = document.getElementById("camera")
            cam.src = "/video_feed"
            cam.style.display = "block"
            document.getElementById("status-dot").style.display = "inline-block"
        }

        function stopCamera() {
            const cam = document.getElementById("camera")
            cam.src = ""
            cam.style.display = "none"
            document.getElementById("status-dot").style.display = "none"
        }

        // poll latest_detection every 500ms for low latency UI updates
        // separate from the video stream so the cards update smoothly
        setInterval(async () => {

            try {

                const response = await fetch("/latest_detection")
                const data = await response.json()

                const weapon = data.weapon || "None"
                const person = data.person || "Unknown"
                const conf = data.confidence || 0
                const level = data.threat_level || "NONE"
                const preMode = data.preprocessing || "normal"

                document.getElementById("weapon").innerHTML = weapon
                document.getElementById("person").innerHTML = person
                document.getElementById("confidence").innerHTML = conf
                document.getElementById("preprocessing").innerHTML = preMode

                const badge = document.getElementById("threat_level")
                badge.innerHTML = level
                badge.className = "threat-badge badge-" + level

                // alert banner for HIGH threat
                const banner = document.getElementById("alert-banner")
                if (level === "HIGH") {
                    banner.style.display = "block"
                } else {
                    banner.style.display = "none"
                }

            } catch (e) {
                // silent fail - connection might be momentarily unavailable
            }

        }, 500)

    </script>

</body>

</html>
